<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delícias da Lolo ✨</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #E6A8B5; --dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Cabeçalho com o botão no topo direito */
        header { 
            text-align: center; padding: 20px; position: relative; 
            display: flex; flex-direction: column; align-items: center; 
        }
        #cart-icon { 
            position: absolute; top: 20px; right: 20px; 
            font-size: 24px; color: var(--primary); cursor: pointer;
        }

        #logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); padding: 12px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .btn-add { background: var(--primary); color: #000; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); display: none; padding: 20px; 
            overflow-y: auto; z-index: 2000;
        }
    </style>
</head>
<body>

    <header>
        <div id="cart-icon" onclick="openModal()"><i class="fas fa-shopping-cart"></i></div>
        <img src="logo.png" id="logo" onerror="this.style.display='none'">
        <h1 id="shop-title" style="margin: 10px 0;">Delícias da Lolo</h1>
        <a href="https://instagram.com/dalolodelicias" style="color:var(--primary); text-decoration:none;">@dalolodelicias</a>
    </header>

    <div class="grid" id="products-grid"></div>

    <div id="modal" class="modal">
        <div style="max-width: 400px; margin: 40px auto; color: white;">
            <h2>Seu Carrinho</h2>
            <div id="cart-items" style="margin-bottom:20px;"></div>
            <h3 id="cart-total">Total: R$ 0.00</h3>
            <input type="text" id="nome" placeholder="Seu Nome" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:none; box-sizing:border-box;">
            <input type="text" id="end" placeholder="Seu Endereço" style="width:100%; padding:15px; margin-bottom:20px; border-radius:10px; border:none; box-sizing:border-box;">
            <button class="btn-add" style="padding: 15px; font-size: 16px;" onclick="finalizar()">Enviar Pedido no WhatsApp</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:20px; padding:15px; background:#444; color:white; border:none; border-radius:10px;">Fechar</button>
        </div>
    </div>

    <script>
        const JSON_URL = 'https://raw.githubusercontent.com/cbvianna001/deliciasdalolo/refs/heads/main/cardapio.json'; 
        let cart = [], menuData = [];

        async function load() {
            try {
                const res = await fetch(JSON_URL);
                const data = await res.json();
                menuData = data.menu;
                const grid = document.getElementById('products-grid');
                menuData.forEach((i, idx) => {
                    grid.innerHTML += `<div class="card"><img src="${i.image}" style="width:100%; height:80px; object-fit:cover; border-radius:10px;"><h3>${i.name}</h3><p>R$ ${i.price.toFixed(2)}</p><button class="btn-add" onclick="addToCart(${idx})">Adicionar</button></div>`;
                });
            } catch(e) { console.error(e); }
        }

        function addToCart(idx) { 
            cart.push(menuData[idx]); 
            updateTotal();
            alert(menuData[idx].name + " adicionado!");
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = `Total: R$ ${total.toFixed(2)}`;
        }

        function openModal() {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('cart-items').innerHTML = cart.map(i => `<p>${i.name} - R$ ${i.price.toFixed(2)}</p>`).join('');
            updateTotal();
        }

        function finalizar() {
            const nome = document.getElementById('nome').value;
            const end = document.getElementById('end').value;
            const total = cart.reduce((sum, item) => sum + item.price, 0).toFixed(2);
            const msg = `Pedido de: ${nome}%0AEndereço: ${end}%0AItens: ${cart.map(i=>i.name).join(', ')}%0ATotal: R$ ${total}`;
            window.open(`https://wa.me/5512988203278?text=${msg}`, '_blank');
        }
        load();
    </script>
</body>
</html>
