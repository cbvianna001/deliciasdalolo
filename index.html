<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delícias da Lolo ✨</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #E6A8B5; --dark: #121212; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        header { text-align: center; padding: 40px 20px; }
        #logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 20px; text-align: center; }
        .btn { background: var(--primary); color: #000; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
        footer { text-align: center; padding: 40px; color: #666; }
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); color: #000; text-align: center; padding: 15px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" id="logo" onerror="this.style.display='none'">
        <h1 id="shop-title">Delícias da Lolo</h1>
        <p>✨ Doçura artesanal</p>
        <a href="https://instagram.com/dalolodelicias" style="color:var(--primary); text-decoration:none;">Instagram: @dalolodelicias</a>
    </header>

    <div class="grid" id="products-grid"></div>

    <div id="cart-bar" onclick="openModal()">Ver Carrinho</div>

    <footer>
        <p>Siga também: <a href="https://instagram.com/systemsjc_" style="color:white">@systemsjc_</a></p>
    </footer>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; padding:20px;">
        <h2>Finalizar Pedido</h2>
        <div id="cart-items"></div>
        <input type="text" id="nome" placeholder="Seu Nome" style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="btn" onclick="finalizar()">Enviar Pedido no WhatsApp</button>
        <button onclick="document.getElementById('modal').style.display='none'" class="btn" style="background:#444">Fechar</button>
    </div>

    <script>
        // SUBSTITUA ESTE LINK PELO SEU LINK RAW DO GITHUB
        const JSON_URL = 'https://raw.githubusercontent.com/cbvianna001/deliciasdalolo/refs/heads/main/cardapio.json'; 
        let cart = [];

        async function load() {
            try {
                const res = await fetch(JSON_URL);
                const data = await res.json();
                const grid = document.getElementById('products-grid');
                data.menu.forEach((i, idx) => {
                    grid.innerHTML += `<div class="card"><img src="${i.image}" style="width:100%; height:100px; object-fit:cover; border-radius:10px;"><h3 style="font-size:14px">${i.name}</h3><p>R$ ${i.price}</p><button class="btn" onclick="addToCart(${idx})">Adicionar</button></div>`;
                });
            } catch(e) { document.getElementById('shop-title').innerText = "Erro ao carregar cardápio"; }
        }

        function addToCart(idx) { cart.push(idx); document.getElementById('cart-bar').style.display = 'block'; }
        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function finalizar() { window.open(`https://wa.me/5512988203278?text=Pedido+iniciado`); }
        
        load();
    </script>
</body>
</html>
