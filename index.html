<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delícias da Lolo ✨</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E6A8B5;
            --dark: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body { 
            background: var(--dark); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            background: radial-gradient(circle at top, #2b2b2b, #000);
            min-height: 100vh;
        }

        header { padding: 50px 20px; text-align: center; }
        
        #shop-logo-img { 
            width: 130px; height: 130px; border-radius: 50%; 
            border: 4px solid var(--primary); box-shadow: 0 0 30px rgba(230,168,181,0.4);
            object-fit: cover; margin-bottom: 20px;
        }

        h1 { font-family: 'Pacifico', cursive; color: var(--primary); font-size: 2.5rem; margin: 0; }
        
        .recipe-box { 
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px; max-width: 350px; margin: 20px auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 20px; max-width: 800px; margin: auto; }

        .card { 
            background: var(--glass); backdrop-filter: blur(5px);
            border-radius: 25px; padding: 15px; text-align: center;
            transition: 0.4s; border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover { transform: translateY(-10px); border-color: var(--primary); }

        .card img { width: 100%; height: 120px; border-radius: 20px; object-fit: cover; margin-bottom: 10px; }

        .btn-pedir { 
            background: var(--primary); color: #000; border: none; padding: 10px 20px;
            border-radius: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px;
        }

        .credits { text-align: center; padding: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" id="shop-logo-img" onerror="this.style.display='none'">
        <h1 id="shop-title">Delícias da Lolo</h1>
        <p>✨ Doçura artesanal em cada detalhe</p>
        
        <div class="recipe-box">
            📸 Siga <b>@dalolodelicias</b> para receitinhas fofas e bastidores!
        </div>
    </header>

    <div class="grid" id="products-grid"></div>

    <div class="credits">Feito com amor por @systemsjc_</div>

    <script>
        const JSON_URL = 'COLE_SEU_LINK_RAW_DO_GITHUB_AQUI';
        const WHATSAPP = '5512988203278';

        async function carregarCardapio() {
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();
                
                document.getElementById('shop-title').innerText = data.config.name;
                const grid = document.getElementById('products-grid');
                
                Object.values(data.menu).forEach(i => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${i.image}">
                            <h3 style="margin:10px 0 5px">${i.name}</h3>
                            <p style="color:var(--primary); font-weight:bold">R$ ${i.price}</p>
                            <button class="btn-pedir" onclick="pedir('${i.name}')">Pedir Agora</button>
                        </div>`;
                });
            } catch (e) { document.getElementById('shop-title').innerText = "Cardápio indisponível"; }
        }

        window.pedir = (nome) => {
            window.open(`https://wa.me/${WHATSAPP}?text=Olá, quero pedir: ${nome}`, '_blank');
        }

        carregarCardapio();
    </script>
</body>
</html>
